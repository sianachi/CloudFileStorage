apiVersion: v1
kind: Service
metadata:
  name: pithos-backend
  namespace: pithos
spec:
  selector:
    app: pithos-backend
  ports:
    - port: 8000
      targetPort: 8000
      name: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pithos-backend
  namespace: pithos
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pithos-backend
  template:
    metadata:
      labels:
        app: pithos-backend
    spec:
      imagePullSecrets:
        - name: ghcr-pull
      containers:
        - name: backend
          image: ghcr.io/sianachi/pithos-backend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8000
              name: http
          envFrom:
            - configMapRef:
                name: pithos-config
          volumeMounts:
            - name: storage
              mountPath: /data/virtual-files
          readinessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /docs
              port: 8000
            initialDelaySeconds: 15
            periodSeconds: 30
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: storage
          persistentVolumeClaim:
            claimName: pithos-storage
